http:
  relativePath: /auth2/
proxy:
  enabled: true
  mode: xforwarded
ingress:
  enabled: true
database:
  vendor: postgresql
  hostname: localhost
  port: 5432
  database: keycloak
  username: keycloak
  password: keycloak
extraEnv:
  - name: KC_HOSTNAME_ADMIN
    value: "http://localhost:3080/auth2/"
  - name: KC_HOSTNAME
    value: "http://localhost:3080/auth2/"
  - name: KC_HOSTNAME_DEBUG
    value: "true"
  - name: KC_LOG_LEVEL
    value: DEBUG
args: "--import-realm"
extraVolumes:
  - name: realm-volume
    configMap:
      name: keycloak-realms
      namespace: keycloak
extraVolumeMounts:
  - mountPath: /opt/bitnami/keycloak/data/import
    name: realm-volume
