---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nginx-ingress-independent
  namespace: nginx-ingress
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: nginx-ingress-independent
subjects:
- kind: ServiceAccount
  name: nginx-ingress-independent
  namespace: nginx-ingress
roleRef:
  kind: ClusterRole
  name: nginx-ingress-operator-nginx-ingress-admin
  apiGroup: rbac.authorization.k8s.io
rules:
  - apiGroups:
      - ""
    resources:
      - services
      - endpoints
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - networking.k8s.io
      - extensions
    resources:
      - ingressclasses
      - ingresses
    verbs:
      - get
      - list
      - watch
